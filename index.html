<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>WayTrace GPS</title>

<meta http-equiv="Content-Security-Policy" content="
default-src 'self';
script-src 'self' https://unpkg.com;
style-src 'self' https://unpkg.com 'unsafe-inline';
img-src 'self' data: https://*.tile.openstreetmap.org;
connect-src 'self' https://*.tile.openstreetmap.org https://unpkg.com https://nominatim.openstreetmap.org;
worker-src 'self' blob:;
font-src 'self' https://unpkg.com;
object-src 'none';
base-uri 'self';
form-action 'self';
">
<link rel="manifest" href="./manifest.webmanifest">

<link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet">
<link href="./styles.css" rel="stylesheet">

</head>

<body>

<div id="map"></div>

<div id="ui">

<header class="ui-header">
	<div class="ui-title">WayTrace GPS</div>
	<button id="btnUiToggle" class="secondary" aria-label="Toggle panel">⋯</button>
</header>

<section id="ui-main">
  <!-- mini toolbar shown when mobile and minimized -->
  <div id="miniTools" class="row" style="display:none;">
    <button id="btnMiniStart" class="primary">Start</button>
    <button id="btnMiniStop" class="secondary">Stop</button>
  </div>
	<div id="statusRow">
		<div id="status">Idle</div>
		<div id="trackInfo" class="muted small"></div>
	</div>

	<div id="controls">
		<div class="row two">
			<button id="btnStart" disabled class="primary">Start</button>
			<button id="btnStop" disabled class="secondary">Stop</button>
		</div>

		<div class="row">
			<button id="btnStopHere" disabled class="secondary">Add Stop</button>
			<button id="btnCenter" class="secondary">Center</button>
		</div>

		<div class="row">
			<button id="btnPay" class="primary">Unlock — £5</button>
			<button id="btnBypass" class="secondary" style="display:none">Test</button>
		</div>

		<div class="row check">
			<input type="checkbox" id="hiAcc">
			<label for="hiAcc">High accuracy</label>
		</div>

		<label class="small">Send interval (s)
			<input id="sendInterval" type="number" value="8">
		</label>
	</div>

	<div id="exportArea" class="row two">
		<button id="btnExportJson" disabled class="secondary">Export JSON</button>
		<button id="btnExportGpx" disabled class="secondary">Export GPX</button>
	</div>

	<hr>

	<div id="stopsArea">
		<label for="stopPostcode">Add stop (UK postcode)</label>
		<div class="row">
			<input id="stopPostcode" placeholder="e.g. SW1A 1AA">
			<button id="btnAddStop" class="secondary">Add</button>
		</div>
		<div id="stopsList" class="stops-list small"></div>
	</div>

</section>

<hr>

<input id="groupCode" placeholder="Group code">

<button id="btnCreateGroup">Create Group</button>
<button id="btnJoinGroup">Join Group</button>

</div>

<script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
<script src="./app.js" defer></script>

<!-- Paywall modal -->
<div id="payModal" class="modal" aria-hidden="true">
	<div class="modal-content">
		<h3>Pay £5 to start this journey</h3>
		<p>To start tracking this journey you must pay a one-off fee of £5.</p>
		<div class="modal-actions">
			<button id="btnPayNow">Pay £5</button>
			<button id="btnPayCancel" class="secondary">Cancel</button>
		</div>
		<p class="small">This demo uses a mock payment flow. For production integrate a payment provider like Stripe Checkout.</p>
	</div>
</div>

</body>
</html>
