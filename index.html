<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>WayTrace GPS</title>

<link rel="manifest" href="./manifest.webmanifest">

">
<meta http-equiv="Content-Security-Policy" content="
default-src 'self';
script-src 'self' https://unpkg.com;
style-src 'self' https://unpkg.com 'unsafe-inline';
img-src 'self' data: https://*.tile.openstreetmap.org;
connect-src 'self' https://*.tile.openstreetmap.org https://unpkg.com https://nominatim.openstreetmap.org;
worker-src 'self' blob:;
font-src 'self' https://unpkg.com;
object-src 'none';
base-uri 'self';
form-action 'self';
">

<link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet">

</head>

<body>

<div id="map"></div>

<div id="ui">

<div id="status">Idle</div>
<div id="trackInfo"></div>
<div id="journeyStats">No journey yet.</div>
<div id="groupInfo"></div>

<hr>

<input id="email" placeholder="email">

<button id="btnLogin">Login</button>
<button id="btnLogout" disabled>Logout</button>

<hr>

<button id="btnStart" disabled>Start Tracking</button>
<button id="btnStop" disabled>Stop Tracking</button>
<button id="btnStopHere" disabled>Add Stop</button>
<button id="btnCenter">Center Map</button>

<button id="btnPay">Unlock tracking — £5</button>
<button id="btnBypass" class="secondary" style="display:none">Continue (Test mode)</button>

<label>
<input type="checkbox" id="hiAcc">
High Accuracy
</label>

<label>
Send Interval
<input id="sendInterval" type="number" value="8">
</label>

<hr>

<button id="btnExportJson" disabled>Export JSON</button>
<button id="btnExportGpx" disabled>Export GPX</button>

<hr>

<div id="stopsArea">
	<label for="stopPostcode">Add stop (UK postcode)</label>
	<input id="stopPostcode" placeholder="e.g. SW1A 1AA">
	<button id="btnAddStop">Add Stop</button>
	<div id="stopsList" class="small"></div>
</div>

<hr>

<input id="groupCode" placeholder="Group code">

<button id="btnCreateGroup" disabled>Create Group</button>
<button id="btnJoinGroup" disabled>Join Group</button>

</div>

<script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
<script src="./app.js" defer></script>

<!-- Paywall modal -->
<div id="payModal" class="modal" aria-hidden="true">
	<div class="modal-content">
		<h3>Pay £5 to start this journey</h3>
		<p>To start tracking this journey you must pay a one-off fee of £5.</p>
		<div class="modal-actions">
			<button id="btnPayNow">Pay £5</button>
			<button id="btnPayCancel" class="secondary">Cancel</button>
		</div>
		<p class="small">This demo uses a mock payment flow. For production integrate a payment provider like Stripe Checkout.</p>
	</div>
</div>

</body>
</html>
